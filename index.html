<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEW LOOK DZ | متجر الأناقة - غليزان</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #f8f9fa; color: #1a1a1a; line-height: 1.6; padding-top: 65px; }

        /* الهيدر العلوي ثابت */
        nav {
            background: #ffffff; position: fixed; top: 0; width: 100%;
            height: 65px; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 2px 15px rgba(0,0,0,0.05); z-index: 2000;
        }
        .logo { font-size: 1.5rem; font-weight: 800; color: #000; letter-spacing: 1px; }

        /* شريط الأيقونات (غير ثابت الآن - يتحرك مع التمرير) */
        .category-switcher {
            background: #ffffff; padding: 15px 0;
            position: relative; /* تم تغييرها من sticky إلى relative */
            z-index: 1000;
            border-bottom: 1px solid #eee;
        }
        .icon-grid { display: flex; justify-content: center; gap: 10px; padding: 0 15px; }

        .category-btn {
            background: #fff; border: 1.5px solid #eee; padding: 12px 5px;
            flex: 1; max-width: 110px; text-align: center; cursor: pointer;
            border-radius: 12px; transition: all 0.3s ease; color: #888;
            display: flex; flex-direction: column; align-items: center;
        }
        .category-icon-container { font-size: 1.7rem; margin-bottom: 5px; }
        .category-btn span { font-size: 0.85rem; font-weight: 700; }

        .category-btn.active { border-color: #d4af37; color: #d4af37; background: #fffdf5; }

        /* المنتجات */
        .products-section { padding: 25px 15px; display: none; min-height: 60vh; }
        .products-section.show { display: block; animation: fadeIn 0.4s ease; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .section-title { text-align: center; margin-bottom: 25px; font-size: 1.4rem; font-weight: 700; }
        .section-title span { color: #d4af37; }

        .product-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 12px; 
        }

        @media (min-width: 768px) { .product-grid { grid-template-columns: repeat(3, 1fr); gap: 20px; } }
        @media (min-width: 1024px) { .product-grid { grid-template-columns: repeat(5, 1fr); } }

        .product-card { 
            background: #fff; border-radius: 15px; overflow: hidden; 
            border: 1px solid #efefef; display: flex; flex-direction: column;
            transition: 0.3s;
        }

        .img-container { 
            width: 100%; height: 200px; background: #fff; 
            display: flex; align-items: center; justify-content: center; 
            padding: 10px;
        }
        .img-container img { max-width: 100%; max-height: 100%; object-fit: contain; }

        .product-info { padding: 12px; text-align: center; flex-grow: 1; }
        .product-info h3 { font-size: 0.9rem; color: #444; margin-bottom: 5px; font-weight: 600; }
        .price { font-weight: 800; color: #d4af37; font-size: 1.1rem; }

        .wa-btn {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            background: #25D366; color: white; text-decoration: none;
            padding: 10px; margin: 0 10px 15px; border-radius: 10px; 
            font-weight: 700; font-size: 0.85rem;
        }

        /* التذييل */
        footer { 
            background: #111; color: #fff; padding: 50px 20px; 
            text-align: center; margin-top: 50px;
        }
        .footer-logo { font-size: 1.8rem; font-weight: 800; margin-bottom: 10px; display: block; }

        .fb-footer-link {
            display: inline-flex; align-items: center; gap: 12px;
            background: #1877F2; color: white; text-decoration: none;
            padding: 14px 30px; border-radius: 50px; font-weight: 700;
            margin: 15px 0; transition: 0.3s;
        }
        .fb-footer-link:hover { background: #145dbf; }
    </style>
</head>
<body>

    <nav><div class="logo">NEW LOOK</div></nav>

    <div class="category-switcher">
        <div class="icon-grid">
            <div class="category-btn active" onclick="showCategory('pants', this)">
                <div class="category-icon-container"><i class="fas fa-trousers"></i></div>
                <span>السراويل</span>
            </div>
            <div class="category-btn" onclick="showCategory('shirts', this)">
                <div class="category-icon-container"><i class="fas fa-shirt"></i></div>
                <span>القمصان</span>
            </div>
            <div class="category-btn" onclick="showCategory('jackets', this)">
                <div class="category-icon-container"><i class="fas fa-coat"></i></div>
                <span>السترات</span>
            </div>
        </div>
    </div>

    <section id="pants" class="products-section show">
        <h2 class="section-title">أحدث موديلات <span>السراويل</span></h2>
        <div id="pants-grid" class="product-grid"></div>
    </section>

    <section id="shirts" class="products-section">
        <h2 class="section-title">تشكيلة <span>القمصان</span> الجديدة</h2>
        <div id="shirts-grid" class="product-grid"></div>
    </section>

    <section id="jackets" class="products-section">
        <h2 class="section-title">أفخم <span>السترات</span> الشتوية</h2>
        <div id="jackets-grid" class="product-grid"></div>
    </section>

    <footer>
        <span class="footer-logo">NEW LOOK DZ</span>
        <p style="opacity: 0.7;">غليزان | جودة وتميز</p>
        <a href="https://fb.watch/FWOUABH5oG/" target="_blank" class="fb-footer-link">
            <i class="fab fa-facebook-f"></i> تابعنا على فيسبوك
        </a>
        <p style="margin-top: 20px; font-size: 0.8rem; opacity: 0.4;">© 2026 جميع الحقوق محفوظة</p>
    </footer>

    <script>
        const products = {
            pants: [
                { name: "سروال جينز كلاسيك", price: "5,500", img: "https://images.unsplash.com/photo-1542272604-787c3835535d?w=400" },
                { name: "سروال تشينو بيج", price: "4,800", img: "https://images.unsplash.com/photo-1624378439575-d8705ad7ae80?w=400" },
                { name: "سروال كارجو زيتي", price: "5,900", img: "https://images.unsplash.com/photo-1584318717992-d61546255147?w=400" },
                { name: "جينز أسود ممزق", price: "5,700", img: "https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?w=400" },
                { name: "سروال رسمي رمادي", price: "6,200", img: "https://images.unsplash.com/photo-1594633225934-b39cd1b84f33?w=400" }
            ],
            shirts: [
                { name: "قميص أبيض بريميوم", price: "4,500", img: "https://images.unsplash.com/photo-1620799140408-edc6dcb6d633?w=400" },
                { name: "قميص جينز أزرق", price: "4,200", img: "https://images.unsplash.com/photo-1603252109360-909baaf261c7?w=400" },
                { name: "تي شيرت قطن أسود", price: "2,500", img: "https://images.unsplash.com/photo-1578587018452-892bacefd3f2?w=400" }
            ],
            jackets: [
                { name: "سترة جلدية سوداء", price: "15,000", img: "https://images.unsplash.com/photo-1551028719-00167b16eac5?w=400" },
                { name: "جاكيت جينز كلاسيك", price: "8,900", img: "https://images.unsplash.com/photo-1616150638538-ffb0679a3fc4?w=400" }
            ]
        };

        function renderProducts(category, containerId) {
            const container = document.getElementById(containerId);
            products[category].forEach(p => {
                container.innerHTML += `
                    <div class="product-card">
                        <div class="img-container"><img src="${p.img}" alt="${p.name}"></div>
                        <div class="product-info"><h3>${p.name}</h3><p class="price">${p.price} د.ج</p></div>
                        <a href="https://wa.me/213772388571?text=أريد طلب: ${p.name}" class="wa-btn">
                            <i class="fab fa-whatsapp"></i> اطلب الآن
                        </a>
                    </div>
                `;
            });
        }

        renderProducts('pants', 'pants-grid');
        renderProducts('shirts', 'shirts-grid');
        renderProducts('jackets', 'jackets-grid');

        function showCategory(categoryId, btn) {
            document.querySelectorAll('.products-section').forEach(s => s.classList.remove('show'));
            document.getElementById(categoryId).classList.add('show');
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
